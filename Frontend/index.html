<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">
    <h1>My Todo List</h1>

    <!-- Form to add / update a task -->
    <div class="form-card">
      <h2 id="form-title">Add New Task</h2>

      <input type="hidden" id="edit-id" />

      <div class="form-row">
        <input type="text" id="task-name" placeholder="Task name" />
        <select id="priority">
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>

      <textarea id="task-desc" placeholder="Description" rows="2"></textarea>

      <div class="form-row">
        <label>Due date
          <input type="date" id="due-date" />
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="is-completed" />
          Completed
        </label>
      </div>

      <div class="form-actions">
        <button id="submit-btn" onclick="submitTask()">Add Task</button>
        <button id="cancel-btn" class="secondary" onclick="cancelEdit()" style="display:none">Cancel</button>
      </div>
    </div>

    <!-- Status message -->
    <p id="status-msg" class="status-msg"></p>

    <!-- Task list -->
    <div id="task-list" class="task-list"></div>
  </div>

  <script src="app.js"></script>
</body>

</html>
